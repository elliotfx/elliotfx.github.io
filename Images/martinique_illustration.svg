<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" width="450" height="350">
  <defs>
    <radialGradient id="oceanGlow" cx="38%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#1a3a4a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#222222" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="450" height="350" fill="#222222"/>
  <rect width="450" height="350" fill="url(#oceanGlow)"/>

  <!-- ===== ISLAND SILHOUETTE ===== -->
  <!-- Approximate clockwise path from NW tip -->
  <path d="
    M 162,48
    C 178,42 206,54 218,72
    C 228,87 224,104 222,120
    C 220,134 224,146 225,160
    C 226,174 222,188 216,200
    C 212,210 210,220 206,230
    C 200,240 186,250 170,253
    C 154,256 138,248 130,236
    C 122,224 124,210 128,198
    C 132,188 138,180 146,176
    L 148,174
    C 150,170 150,164 146,158
    C 142,152 134,146 132,134
    C 130,120 134,106 138,94
    C 142,82 142,68 150,58
    C 156,50 159,46 162,48
    Z
  " fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Mt Pelée triangle (north) -->
  <polygon points="159,70 165,56 171,70" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.32"/>

  <!-- Fort-de-France dot + label -->
  <circle cx="146" cy="166" r="3.5" fill="#8ab4c4" opacity="0.9"/>
  <line x1="150" y1="163" x2="165" y2="152" stroke="#8ab4c4" stroke-width="0.8" stroke-opacity="0.55"/>
  <text x="167" y="151" font-family="Arial, sans-serif" font-size="7" fill="#8ab4c4" fill-opacity="0.75">Fort-de-France</text>

  <!-- ===== INSEE BADGE ===== -->
  <rect x="20" y="18" width="60" height="24" rx="4"
        fill="#ffffff" fill-opacity="0.06"
        stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="50" y="33"
        font-family="Arial Black, sans-serif" font-size="10"
        fill="white" fill-opacity="0.58"
        text-anchor="middle" letter-spacing="2">INSEE</text>

  <!-- ===== CHART AREA (right side) ===== -->
  <!-- Axes -->
  <line x1="268" y1="50" x2="268" y2="232" stroke="white" stroke-width="0.7" stroke-opacity="0.22"/>
  <line x1="268" y1="232" x2="430" y2="232" stroke="white" stroke-width="0.7" stroke-opacity="0.22"/>

  <!-- Horizontal grid -->
  <line x1="268" y1="122" x2="430" y2="122" stroke="white" stroke-width="0.5" stroke-dasharray="3,4" stroke-opacity="0.1"/>
  <line x1="268" y1="177" x2="430" y2="177" stroke="white" stroke-width="0.5" stroke-dasharray="3,4" stroke-opacity="0.1"/>

  <!-- Bars (population decline : bars shrink left to right) -->
  <rect x="278" y="90"  width="24" height="142" fill="white" fill-opacity="0.62" rx="2"/>
  <rect x="308" y="100" width="24" height="132" fill="white" fill-opacity="0.50" rx="2"/>
  <rect x="338" y="115" width="24" height="117" fill="white" fill-opacity="0.38" rx="2"/>
  <rect x="368" y="134" width="24" height="98"  fill="white" fill-opacity="0.26" rx="2"/>
  <rect x="398" y="155" width="24" height="77"  fill="white" fill-opacity="0.16" rx="2"/>

  <!-- Trend line -->
  <polyline points="290,90 320,100 350,115 380,134 410,155"
    stroke="white" stroke-width="2" fill="none" stroke-opacity="0.72" stroke-linejoin="round"/>
  <circle cx="290" cy="90"  r="3.5" fill="#8ab4c4"/>
  <circle cx="320" cy="100" r="3.5" fill="#8ab4c4"/>
  <circle cx="350" cy="115" r="3.5" fill="#8ab4c4"/>
  <circle cx="380" cy="134" r="3.5" fill="#8ab4c4"/>
  <circle cx="410" cy="155" r="3.5" fill="#8ab4c4"/>

  <!-- X-axis year labels -->
  <text x="290" y="246" font-family="Arial, sans-serif" font-size="7" fill="white" fill-opacity="0.34" text-anchor="middle">1990</text>
  <text x="320" y="246" font-family="Arial, sans-serif" font-size="7" fill="white" fill-opacity="0.34" text-anchor="middle">1999</text>
  <text x="350" y="246" font-family="Arial, sans-serif" font-size="7" fill="white" fill-opacity="0.34" text-anchor="middle">2006</text>
  <text x="380" y="246" font-family="Arial, sans-serif" font-size="7" fill="white" fill-opacity="0.34" text-anchor="middle">2014</text>
  <text x="410" y="246" font-family="Arial, sans-serif" font-size="7" fill="white" fill-opacity="0.34" text-anchor="middle">2021</text>

  <!-- Chart label -->
  <text x="349" y="46"
        font-family="Arial, sans-serif" font-size="8"
        fill="white" fill-opacity="0.33"
        text-anchor="middle" letter-spacing="2">ÉVOLUTION DÉMOGRAPHIQUE</text>

  <!-- ===== SEPARATOR ===== -->
  <line x1="20" y1="268" x2="430" y2="268" stroke="white" stroke-width="0.5" stroke-opacity="0.14"/>

  <!-- ===== TITLE ===== -->
  <text x="225" y="306"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="38" fill="white" fill-opacity="0.95"
        text-anchor="middle" letter-spacing="10">MARTINIQUE</text>

  <!-- ===== SUBTITLE ===== -->
  <text x="225" y="328"
        font-family="Arial, sans-serif" font-size="9"
        fill="white" fill-opacity="0.36"
        text-anchor="middle" letter-spacing="3">ÉTUDE ÉCONOMIQUE ET DÉMOGRAPHIQUE</text>

  <!-- ===== YEAR RANGE ===== -->
  <text x="225" y="346"
        font-family="Arial, sans-serif" font-size="8"
        fill="white" fill-opacity="0.20"
        text-anchor="middle" letter-spacing="1">1990 — 2021</text>
</svg>
