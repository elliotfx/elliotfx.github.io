name: Apply portfolio refresh

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
    paths:
      - .portfolio-refresh-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and validate the corrections
        run: python .github/scripts/refresh_portfolio.py

      - name: Commit the corrected portfolio
        shell: bash
        run: |
          rm -f .portfolio-refresh-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh portfolio content and consistency"
          git push
